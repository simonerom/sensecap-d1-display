; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:sensecap_indicator]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags = 
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DGFX_BL=45
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_USE_LOG=1
	-DLV_LOG_LEVEL=LV_LOG_LEVEL_WARN
	-DARDUINO_RUNNING_CORE=1
upload_speed = 921600
upload_port = /dev/cu.wchusbserial2110
monitor_port = /dev/cu.usbmodem21201
board_build.partitions = partitions_8MB_noota.csv
board_build.arduino.memory_type = qio_opi
lib_deps =
	lvgl/lvgl@^8.3.11
	hideakitai/PCA95x5@^0.1.3
	bblanchon/ArduinoJson@^7.0.4
	https://github.com/leethomason/tinyxml2.git
	WiFi
	Wire
	FS
	SPIFFS
	moononournation/GFX Library for Arduino@1.3.5
extra_scripts = pre:scripts/setup_lvgl.py

[env:sensecap_debug]
extends = env:sensecap_indicator
build_type = debug
build_flags =
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DGFX_BL=45
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_USE_LOG=1
	-DLV_LOG_LEVEL=LV_LOG_LEVEL_WARN
	-DARDUINO_RUNNING_CORE=1
	-DCORE_DEBUG_LEVEL=5
