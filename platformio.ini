; PlatformIO Project Configuration File
; SenseCAP Indicator D1 - ESP32-S3 + 4" Touchscreen Display

[env:sensecap_indicator]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; TFT_eSPI driver configuration for SenseCAP Indicator D1
    -DILI9341_DRIVER
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=14
    -DTFT_RST=9
    -DTFT_BL=45
    -DTOUCH_CS=8
    ; LVGL configuration
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_USE_LOG=1
    -DLV_LOG_LEVEL=LV_LOG_LEVEL_WARN
    ; Arduino stack size
    -DARDUINO_RUNNING_CORE=1

; Upload settings
upload_speed = 921600
upload_port = /dev/cu.usbmodem*

; Partition scheme with OTA
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

; Libraries
lib_deps =
    lvgl/lvgl@^8.3.11
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4
    WiFi

; Extra scripts to configure LVGL
extra_scripts = pre:scripts/setup_lvgl.py
